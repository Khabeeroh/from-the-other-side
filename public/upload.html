<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD SIGHTINGS</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container upload-container">

      <div class="navbar">
        <img src="" alt="LogoImg" />

        <div class="navlink">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Read.html">Read</a></li>
            <li><a href="upload.html">Upload</a></li>
          </ul>
        </div>
    </div>

      <div class="main">
        <div class="header">
          <h4>FROM THE OTHER SIDE</h4>
        </div>
        <h1> ADD SIGHTINGS</h1>
    </div>

    <div class="form">
        <form action="" id="form" name="form">
            <div class="title">
                 <label for="title">Title:</label>
                <input type="text" name="title" id="title" placeholder="A ghostly encounter">
            </div>

            <div class="timeDate">
                 <label for="datetime">Time/Date:</label>
                <input type="datetime-local" name="datetime" id="datetime">
            </div>

             <div class="location">
                 <label for="location">Location:</label>
                <input type="text" name="location" id="location" placeholder="Oyo, Nigeria">
            </div>
           
             <div class="details">
                 <label for="details">Details:</label>
                <textarea name="details" id="details" cols="40" rows="7" placeholder="I was trying to get to sleep when..."></textarea>
            </div>

            <button id="sub-btn" type="submit">SUMMIT</button>
            <div id="formMessageText" class="form-message"> All sighting will be uploaded in <a href="Read.html">SIGHTINGS</a> page.</div>
        </form>

        <div class="footer">
          <p>&copy; From The The Other Side. All rights reserved </p>
      </div>  
    </div>

    <script type="module" src="upload.js"></script>
</body>
</html>
